nas:
  # NASのマウントパス（Windowsドライブレター or UNCパス）
  # 例: "Z:\\共有\\Excel" or "\\\\192.168.1.100\\shared\\excel"
  base_path: "Z:\\共有\\Excel"
  file_patterns:
    - "*.xlsx"
  exclude_patterns:
    - "~$*"
    - "*.tmp"
    - ".~lock*"
  # SMB認証（Windowsサービスで動かす場合に必須。対話ログインユーザーの
  # credentialキャッシュを共有できないため、明示的に認証を渡す）。
  # 省略可（GUIユーザーのキャッシュに頼る場合など）。
  # auth:
  #   server: "Tamatex-nas8tb"
  #   username: "admin"
  #   password: "your-nas-password"

google:
  # サービスアカウントのJSONキーファイルパス
  credentials_path: "./config/service_account.json"
  # 同期先Google DriveフォルダID（空なら自動作成）
  drive_folder_id: ""
  # スプレッドシートを共有するメールアドレス一覧
  share_with: []
    # - "sales@example.com"
    # - "executive@example.com"

sync:
  interval_minutes: 15
  # 状態DBファイルのパス（空なら設定ファイルと同じディレクトリに自動作成）
  # state_db_path: "C:\\tamatex\\tamatex_state.db"

logging:
  level: "INFO"
  file: "./logs/tamatex.log"
  max_size_mb: 10
  backup_count: 5
